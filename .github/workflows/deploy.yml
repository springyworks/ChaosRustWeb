name: Deploy to GitHub Pages

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk
        uses: jetli/trunk-action@v0.4.0

      - name: Build with Trunk
        # Replace 'repository-name' with your actual repository name if it's not at the root domain
        # dynamic public-url helper:
        run: |
          REPO_NAME=$(echo ${{ github.repository }} | cut -d'/' -f2)
          trunk build --release --public-url /$REPO_NAME/ ChaosRustWeb/index.html --dist ChaosRustWeb/dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ChaosRustWeb/dist
