<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>ChaosRustWeb - 4D Ripple Tank</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body { 
            width: 100%;
            height: 100%;
            margin: 0; 
            padding: 0;
            background-color: #050508; 
            overflow: hidden; 
            touch-action: none;
        }
        #bevy { 
            width: 100%;
            height: 100%;
            display: block;
            background-color: #050508;
        }
    </style>
<link rel="modulepreload" href="/chaos_rust_web-32c0233e360a8cd8.js" crossorigin="anonymous" integrity="sha384-C5hk/eYhBh6eBVE1zuVJybG6r2+zCHulbD+LqniUglu5W1wemi7TlJfoZmsv0zZP"><link rel="preload" href="/chaos_rust_web-32c0233e360a8cd8_bg.wasm" crossorigin="anonymous" integrity="sha384-4T3dPbRql3PrZ/7zVvn2hvm3hMk0T6ov0ejGN3kLwDq9ZDdiP7o1s7QW0TeIeeNj" as="fetch" type="application/wasm"></head>
<body>
    <canvas id="bevy" oncontextmenu="return false;"></canvas>
    <div id="loading" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#6af;font-family:monospace;font-size:1.2em;">Loading WASM...</div>
    
    <script>
        // Pre-flight WebGL2 check using a TEMPORARY canvas (not #bevy)
        (function() {
            var testCanvas = document.createElement('canvas');
            testCanvas.width = 1;
            testCanvas.height = 1;
            var gl = testCanvas.getContext('webgl2');
            var loadEl = document.getElementById('loading');
            if (!gl) {
                console.error('[ChaosRust] WebGL2 NOT available on this device!');
                loadEl.innerHTML = 'ERROR: WebGL2 not supported on this device/browser.<br>Try Chrome or a newer browser.';
                loadEl.style.color = '#f44';
            } else {
                var dbg = gl.getExtension('WEBGL_debug_renderer_info');
                var renderer = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : 'unknown';
                var vendor = dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL) : 'unknown';
                console.log('[ChaosRust] WebGL2 OK - Renderer:', renderer, '- Vendor:', vendor);
                console.log('[ChaosRust] Max texture size:', gl.getParameter(gl.MAX_TEXTURE_SIZE));
                console.log('[ChaosRust] Max vertex attribs:', gl.getParameter(gl.MAX_VERTEX_ATTRIBS));
                // Destroy test context and canvas
                var ext = gl.getExtension('WEBGL_lose_context');
                if (ext) ext.loseContext();
                testCanvas = null;
            }
        })();

        // Prevent default context menu
        document.addEventListener('contextmenu', event => event.preventDefault());
        // Hide loading indicator once WASM starts rendering
        const observer = new MutationObserver(() => {
            const el = document.getElementById('loading');
            if (el) el.remove();
            observer.disconnect();
        });
        observer.observe(document.getElementById('bevy'), { attributes: true });
        // Fallback: hide after 15s regardless
        setTimeout(() => { const el = document.getElementById('loading'); if (el) el.remove(); }, 15000);
    </script>

<script type="module">
import init, * as bindings from '/chaos_rust_web-32c0233e360a8cd8.js';
const wasm = await init({ module_or_path: '/chaos_rust_web-32c0233e360a8cd8_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script><script>"use strict";

(function () {

    const address = '{{__TRUNK_ADDRESS__}}';
    const base = '{{__TRUNK_WS_BASE__}}';
    let protocol = '';
    protocol =
        protocol
            ? protocol
            : window.location.protocol === 'https:'
                ? 'wss'
                : 'ws';
    const url = protocol + '://' + address + base + '.well-known/trunk/ws';

    class Overlay {
        constructor() {
            // create an overlay
            this._overlay = document.createElement("div");
            const style = this._overlay.style;
            style.height = "100vh";
            style.width = "100vw";
            style.position = "fixed";
            style.top = "0";
            style.left = "0";
            style.backgroundColor = "rgba(222, 222, 222, 0.5)";
            style.fontFamily = "sans-serif";
            // not sure that's the right approach
            style.zIndex = "1000000";
            style.backdropFilter = "blur(1rem)";

            const container = document.createElement("div");
            // center it
            container.style.position = "absolute";
            container.style.top = "30%";
            container.style.left = "15%";
            container.style.maxWidth = "85%";

            this._title = document.createElement("div");
            this._title.innerText = "Build failure";
            this._title.style.paddingBottom = "2rem";
            this._title.style.fontSize = "2.5rem";

            this._message = document.createElement("div");
            this._message.style.whiteSpace = "pre-wrap";

            const icon= document.createElement("div");
            icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#dc3545" viewBox="0 0 16 16"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/></svg>';
            this._title.prepend(icon);

            container.append(this._title, this._message);
            this._overlay.append(container);

            this._inject();
            window.setInterval(() => {
                this._inject();
            }, 250);
        }

        set reason(reason) {
            this._message.textContent = reason;
        }

        _inject() {
            if (!this._overlay.isConnected) {
                // prepend it
                document.body?.prepend(this._overlay);
            }
        }

    }

    class Client {
        constructor(url) {
            this.url = url;
            this.poll_interval = 5000;
            this._overlay = null;
        }

        start() {
            const ws = new WebSocket(this.url);
            ws.onmessage = (ev) => {
                const msg = JSON.parse(ev.data);
                switch (msg.type) {
                    case "reload":
                        this.reload();
                        break;
                    case "buildFailure":
                        this.buildFailure(msg.data)
                        break;
                }
            };
            ws.onclose = () => this.onclose();
        }

        onclose() {
            window.setTimeout(
                () => {
                    // when we successfully reconnect, we'll force a
                    // reload (since we presumably lost connection to
                    // trunk due to it being killed, so it will have
                    // rebuilt on restart)
                    const ws = new WebSocket(this.url);
                    ws.onopen = () => window.location.reload();
                    ws.onclose = () => this.onclose();
                },
                this.poll_interval);
        }

        reload() {
            window.location.reload();
        }

        buildFailure({reason}) {
            // also log the console
            console.error("Build failed:", reason);

            console.debug("Overlay", this._overlay);

            if (!this._overlay) {
                this._overlay = new Overlay();
            }
            this._overlay.reason = reason;
        }
    }

    new Client(url).start();

})()
</script></body>
</html>
